name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request history
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Checkout push history
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
      - name: Fetch base branch for Changesets
        if: github.event_name == 'pull_request'
        run: git fetch origin main:main
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run test:unit
      - run: npm run test:contract
      - run: npm run test:integration
      - run: npx playwright install --with-deps chromium --only-shell
      - run: npm run test:e2e
      - name: Validate Changesets release plan
        if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'changeset-release/')
        run: npm run changeset:status
